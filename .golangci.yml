# Linter configuration for cogent. Run with: golangci-lint run
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gofmt
    - goimports

issues:
  exclude-rules:
    # Test files may use dot-style brevity and skip some error checks.
    - path: _test\.go
      linters:
        - errcheck

run:
  timeout: 2m
